data:
  text_file: data/tiny_corpus.txt
  val_frac: 0.1

model:
  vocab_size: 256
  d_model: 128
  n_heads: 4
  n_layers: 2
  max_seq_len: 64
  dropout: 0.0
  weight_sharing: true

train:
  seed: 1337
  use_cuda: true
  lr: 0.001
  batch_size: 16
  steps: 200
  eval_every: 50
  eval_steps: 8

quantize:
  bits: 4
  group_size: 64
  exclude_patterns:
    - token_emb
    - head
    - ln
    - norm
  fallback_dtype: fp16

prune:
  amount: 0.2

lowrank:
  rank: 32

qat:
  enabled: true
  steps: 40
  lr: 0.0003

