data:
  text_file: data/local_slice_corpus.txt
  val_frac: 0.1

model:
  vocab_size: 256
  d_model: 256
  n_heads: 8
  attn_kv_heads: 4
  n_layers: 4
  max_seq_len: 128
  dropout: 0.0
  weight_sharing: false
  positional_encoding: alibi

train:
  seed: 1337
  use_cuda: true
  lr: 0.001
  batch_size: 24
  steps: 300
  eval_every: 60
  eval_steps: 8
  grad_clip: 1.0
  time_budget_sec: 45
  stop_on_budget: true
  budget_check_every: 5

quantize:
  bits: 4
  group_size: 40
  exclude_patterns:
    - token_emb
    - head
    - ln
    - norm
  fallback_dtype: fp16
  pack_order: size_desc
  layer_bits: {}
  sparse_2_4_pack: false

prune:
  amount: 0.08
  mode: row
  include_patterns:
    - attn
  progressive: true
  start_step: 120
  end_step: 300
  every: 30

lowrank:
  rank: 96

qat:
  enabled: true
  steps: 80
  lr: 0.0002
  grad_clip: 1.0
  delay_fake_quant_steps: 20

distill:
  enabled: false
