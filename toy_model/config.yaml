data:
  text_file: data/tiny_corpus.txt
  val_frac: 0.1

model:
  vocab_size: 256
  d_model: 128
  n_heads: 4
  n_layers: 2
  max_seq_len: 64
  dropout: 0.0
  weight_sharing: false

train:
  seed: 1337
  use_cuda: true
  lr: 0.001
  batch_size: 16
  steps: 200
  eval_every: 50
  eval_steps: 8

quantize:
  bits: null
  group_size: 64
  exclude_patterns:
    - token_emb
    - head
    - ln
    - norm
  fallback_dtype: fp16

prune:
  amount: 0.0

lowrank:
  rank: null

qat:
  enabled: false
  steps: 0
  lr: 0.0005

distill:
  enabled: false
  alpha: 0.5
  temperature: 2.0
  teacher_steps: 0
  teacher_lr: 0.001
  teacher_model:
    d_model: 192
    n_heads: 6
    n_layers: 3
    max_seq_len: 64
    dropout: 0.0
    weight_sharing: false
    vocab_size: 256
